title: "개혁주의 성경연구"
description: "개혁주의(Reformed) 신학 관점의 성경 연구 아카이브"
lang: ko
timezone: Asia/Seoul
future: true
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

collections:
  studies:
    output: true
    permalink: /studies/:path/

defaults:
  - scope:
      path: ""
      type: studies
    values:
      layout: study
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - templates
